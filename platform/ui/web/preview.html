<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aether Nexus UI Preview</title>
  <style>
    body { margin:0; font-family: Inter, Arial; background:#090b14; color:white; padding:24px; }
    .hero{margin-bottom:18px;border:1px solid rgba(34,211,238,.35);background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border-radius:18px;padding:16px;box-shadow:0 0 24px rgba(34,211,238,.25)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .card{border-radius:16px;background:rgba(255,255,255,.06);border:1px solid rgba(217,70,239,.25);padding:12px}
  </style>
</head>
<body>
  <div class="hero">
    <h1>Your Adaptive Universe</h1>
    <p>Layout generated from real-time intent, context, and wellbeing signals.</p>
  </div>
  <div class="grid">
    <div class="card"><h3>Immersive Creator Streams</h3><p>Mode: media</p><small>AI confidence: 98.4%</small></div>
    <div class="card"><h3>Smart Commute Pulse</h3><p>Mode: map</p><small>AI confidence: 92.1%</small></div>
    <div class="card"><h3>Trusted Communities</h3><p>Mode: community</p><small>AI confidence: 95.5%</small></div>
  </div>
</body>
</html>
